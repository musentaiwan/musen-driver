<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沐森商務定位</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #001f3f; color: white; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #d4af37; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div id="status">系統啟動中...</div>

    <script>
        window.onload = function() {
            liff.init({ liffId: "2009589320-jnRQxLaF" })
                .then(() => {
                    if (!liff.isLoggedIn()) {
                        liff.login();
                    } else {
                        document.getElementById('status').innerText = "正在精確定位...";
                        navigator.geolocation.getCurrentPosition((pos) => {
                            const lat = pos.coords.latitude.toFixed(6);
                            const lng = pos.coords.longitude.toFixed(6);
                            const timeStr = new Date().toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit' });
                            const dateStr = new Date().toLocaleDateString('zh-TW');

                            // 這裡就是發送 Flex Message 卡片的關鍵
                            liff.sendMessages([{
                                "type": "flex",
                                "altText": "司機到點回報",
                                "contents": {
                                  "type": "bubble",
                                  "body": {
                                    "type": "box",
                                    "layout": "vertical",
                                    "contents": [
                                      { "type": "text", "text": "你已報到成功", "size": "sm", "color": "#1DB446", "weight": "bold" },
                                      { "type": "text", "text": "到點報到 " + timeStr, "size": "xxl", "margin": "md", "weight": "bold", "color": "#000000" },
                                      { "type": "text", "text": dateStr, "size": "xs", "color": "#aaaaaa", "margin": "xs" },
                                      { "type": "separator", "margin": "lg" },
                                      { "type": "box", "layout": "vertical", "margin": "lg", "spacing": "sm", "contents": [
                                          { "type": "box", "layout": "baseline", "spacing": "sm", "contents": [
                                              { "type": "text", "text": "回報位置", "color": "#aaaaaa", "size": "sm", "flex": 2 },
                                              { "type": "text", "text": "司機端 GPS 驗證", "wrap": true, "color": "#666666", "size": "sm", "flex": 4 }
                                          ]},
                                          { "type": "box", "layout": "baseline", "spacing": "sm", "contents": [
                                              { "type": "text", "text": "精確座標", "color": "#aaaaaa", "size": "sm", "flex": 2 },
                                              { "type": "text", "text": lat + ", " + lng, "wrap": true, "color": "#666666", "size": "sm", "flex": 4 }
                                          ]}
                                      ]}
                                    ]
                                  },
                                  "footer": {
                                    "type": "box", "layout": "vertical", "contents": [
                                      { "type": "text", "text": "沐森商務管理系統", "size": "xs", "color": "#aaaaaa", "align": "center" }
                                    ]
                                  }
                                }
                            }]).then(() => {
                                document.getElementById('status').innerText = "報到成功！卡片已傳送";
                                setTimeout(() => liff.closeWindow(), 1500);
                            });
                        }, (err) => {
                            alert("請開啟定位權限後再試一次");
                        }, { enableHighAccuracy: true });
                    }
                });
        };
    </script>
</body>
</html>
