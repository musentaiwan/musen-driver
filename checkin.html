<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沐森商務 | 司機定位報到</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #001f3f; color: white; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #d4af37; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-size: 16px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div id="status">正在取得精準定位...</div>

    <script>
        // --- 請在此處填入您的資訊 ---
        const LIFF_ID = "2009589320-jnRQxLaF"; 
        const GOOGLE_MAPS_API_KEY = "您的_GOOGLE_API_KEY"; // 若需自動換算地址，請填入此金鑰
        // -------------------------

        async function initializeLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    getLocation();
                }
            } catch (err) {
                document.getElementById('status').innerText = "系統初始化失敗";
                console.error(err);
            }
        }

        function getLocation() {
            liff.getLocation().then(async (res) => {
                const lat = res.latitude;
                const lng = res.longitude;
                let address = "無法取得詳細地址";

                // 如果有提供 Google API Key，則進行逆向地址換算
                if (GOOGLE_MAPS_API_KEY !== "您的_GOOGLE_API_KEY") {
                    try {
                        const response = await fetch(`https://maps.googleapis.com/maps/api/geocode/json?latlng=${lat},${lng}&key=${GOOGLE_MAPS_API_KEY}&language=zh-TW`);
                        const data = await response.json();
                        if (data.status === "OK") {
                            address = data.results[0].formatted_address;
                        }
                    } catch (e) { console.error("地址換算失敗", e); }
                }

                // 組合發送給群組的訊息內容
                const messageText = `【司機回報：到點】\n------------------\n📍 地址：${address}\n🌐 座標：${lat.toFixed(6)}, ${lng.toFixed(6)}\n⏰ 時間：${new Date().toLocaleString('zh-TW', {hour12: false})}`;

                // 自動發送訊息並關閉視窗
                liff.sendMessages([{
                    type: 'text',
                    text: messageText
                }]).then(() => {
                    document.getElementById('status').innerText = "報到成功！正在返回...";
                    setTimeout(() => { liff.closeWindow(); }, 1000);
                }).catch((err) => {
                    alert("發送訊息失敗，請確認是否已授權傳送訊息權限。");
                    liff.closeWindow();
                });

            }).catch((err) => {
                alert("請務必允許「分享位置」權限，否則無法完成報到。");
                liff.closeWindow();
            });
        }

        initializeLiff();
    </script>
</body>
</html>
