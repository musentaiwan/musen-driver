<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沐森商務定位</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #001f3f; color: white; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #d4af37; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div id="status">沐森商務系統啟動中...</div>

    <script>
        window.onload = function() {
            // 直接使用您的正式 LIFF ID
            liff.init({ liffId: "2009589320-jnRQxLaF" })
                .then(() => {
                    if (!liff.isLoggedIn()) {
                        liff.login();
                    } else {
                        document.getElementById('status').innerText = "正在讀取 GPS...";
                        liff.getLocation().then(res => {
                            const msg = `【司機回報：到點】\n座標：${res.latitude.toFixed(6)}, ${res.longitude.toFixed(6)}\n時間：${new Date().toLocaleString('zh-TW')}`;
                            liff.sendMessages([{ type: 'text', text: msg }])
                                .then(() => {
                                    document.getElementById('status').innerText = "回報完成！";
                                    setTimeout(() => liff.closeWindow(), 1000);
                                });
                        }).catch(err => alert("請開啟定位權限並重試"));
                    }
                })
                .catch(err => {
                    document.getElementById('status').innerText = "錯誤：" + err.message;
                });
        };
    </script>
</body>
</html>
