<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>沐森禮賓｜預約系統</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #1a1a1a; color: #d4af37; font-family: 'PingFang TC', sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; background: #222; padding: 25px; border-radius: 15px; border: 1px solid #d4af37; box-shadow: 0 10px 40px rgba(0,0,0,0.8); box-sizing: border-box; }
        h3 { text-align: center; font-weight: 300; letter-spacing: 2px; color: #fff; margin-bottom: 20px; }
        .tab-group { display: flex; margin-bottom: 25px; gap: 10px; }
        .tab { flex: 1; padding: 12px; border: 1px solid #d4af37; border-radius: 10px; text-align: center; cursor: pointer; color: #d4af37; font-size: 15px; transition: 0.3s; }
        .tab.active { background: #d4af37; color: #1a1a1a; font-weight: bold; }
        .form-section { display: none; }
        .form-section.active { display: block; }
        .form-group { margin-bottom: 18px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #aaa; }
        input, select, textarea { width: 100%; height: 48px; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #333; color: #fff; box-sizing: border-box; font-size: 16px; outline: none; -webkit-appearance: none; }
        textarea { height: auto; min-height: 80px; }
        .row-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .row-group .form-group { flex: 1; margin-bottom: 0; }
        .address-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .address-row select { flex: 1; }
        .full-address { margin-top: 5px; }
        .add-btn { background: transparent; color: #d4af37; border: 1px dashed #d4af37; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; margin-bottom: 15px; font-size: 14px; }
        .checkbox-container { display: flex; align-items: center; margin-top: 10px; padding: 12px; background: #2a2a2a; border-radius: 8px; cursor: pointer; border: 1px solid #444; width: 100%; box-sizing: border-box; }
        input[type="checkbox"] { width: 22px; height: 22px; margin-right: 12px; cursor: pointer; accent-color: #d4af37; -webkit-appearance: checkbox; }
        .checkbox-label { color: #d4af37; font-size: 14px; cursor: pointer; user-select: none; flex: 1; }
        .section-title { font-size: 14px; color: #d4af37; margin: 15px 0 10px 0; border-left: 3px solid #d4af37; padding-left: 8px; }
        .policy-box { margin-top: 25px; padding: 15px; background: #2d2d2d; border-radius: 10px; border: 1px solid #444; font-size: 13px; color: #ccc; line-height: 1.6; }
        .policy-title { color: #d4af37; font-weight: bold; margin-bottom: 8px; display: block; text-align: center; border-bottom: 1px solid #444; padding-bottom: 8px; }
        .policy-content { height: 140px; overflow-y: scroll; padding-right: 5px; }
        .submit-btn { background: linear-gradient(to bottom, #d4af37, #b8860b); color: #1a1a1a; border: none; padding: 18px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; box-shadow: 0 5px 15px rgba(212,175,55,0.4); }
        .footer-note { font-size: 12px; color: #666; margin-top: 30px; text-align: center; border-top: 1px solid #333; padding-top: 15px; }
        /* 座椅視覺優化 */
        .seat-item { display: flex; gap: 8px; margin-bottom: 10px; }
        .seat-type { flex: 2; background: #444 !important; border: 1px solid #d4af37 !important; color: #fff; }
        .seat-qty { flex: 1; display: none; background: #555 !important; border: 1px solid #d4af37 !important; color: #fff !important; }
    </style>
</head>
<body>
    <div class="container">
        <h3 id="userNameDisplay">沐森禮賓 預約系統</h3>
        <div class="tab-group">
            <div id="tabDep" class="tab active" onclick="switchTab('departure')">送機填寫</div>
            <div id="tabArr" class="tab" onclick="switchTab('arrival')">接機填寫</div>
        </div>

        <!-- 送機 -->
        <div id="depSection" class="form-section active">
            <div class="form-group"><label>送機日期</label><input type="date" id="dep-date"></div>
            <div class="form-group"><label>聯絡電話</label><input type="tel" id="dep-phone" placeholder="聯絡電話" oninput="syncPhone(this.value)"></div>
            <div class="form-group"><label>去程 班機號碼</label><input type="text" id="dep-flight" placeholder="例如：BR198"></div>
            <div class="form-group"><label>上車時間</label><input type="time" id="dep-time"></div>
            <div class="form-group">
                <label>上車起點</label>
                <div class="address-row">
                    <select id="dep-city" onchange="updateDistricts('dep')"></select>
                    <select id="dep-dist"></select>
                </div>
                <input type="text" id="dep-detail" class="full-address" placeholder="門牌地址">
                <div class="checkbox-container" onclick="toggleCB('save-dep')">
                    <input type="checkbox" id="save-dep" onclick="event.stopPropagation()">
                    <span class="checkbox-label">下次繼續使用地址與電話</span>
                </div>
            </div>
            <div id="depExtraGroup"></div>
            <button type="button" class="add-btn" onclick="addExtra('dep')">＋ 增加送機加點</button>
            <div class="form-group"><label>送機終點</label><input type="text" id="dep-end" placeholder="桃園機場航廈"></div>
            <div class="row-group">
                <div class="form-group"><label>大人</label><select id="dep-adult" onchange="checkPaxLimit('dep')"></select></div>
                <div class="form-group"><label>小孩</label><select id="dep-child" onchange="checkPaxLimit('dep')"></select></div>
            </div>
            <div class="section-title">行李規格 (超載警示)</div>
            <div class="row-group">
                <div class="form-group"><label>手提</label><select class="lug-sel" id="dep-lug-hand" onchange="checkAllLuggage('dep')"></select></div>
                <div class="form-group"><label>20吋</label><select class="lug-sel" id="dep-lug-20" onchange="checkAllLuggage('dep')"></select></div>
            </div>
            <div class="row-group">
                <div class="form-group"><label>24-26吋</label><select class="lug-sel" id="dep-lug-24" onchange="checkAllLuggage('dep')"></select></div>
                <div class="form-group"><label>28-30吋</label><select class="lug-sel" id="dep-lug-28" onchange="checkAllLuggage('dep')"></select></div>
            </div>
            <div class="form-group"><label>胖胖箱</label><select class="lug-sel" id="dep-lug-fat" onchange="checkAllLuggage('dep')"></select></div>
            <div class="section-title">兒童座椅需求 (最多 4 欄)</div>
            <div id="depSeatGroup"></div>
            <button type="button" class="add-btn" onclick="addSeat('dep')">＋ 增加兒童座椅</button>
            <div class="form-group"><label>備註</label><textarea id="dep-memo" rows="2"></textarea></div>
        </div>

        <!-- 接機 -->
        <div id="arrSection" class="form-section">
            <div class="form-group"><label>接機日期</label><input type="date" id="arr-date"></div>
            <div class="form-group"><label>聯絡電話</label><input type="tel" id="arr-phone" placeholder="聯絡電話" oninput="syncPhone(this.value)"></div>
            <div class="form-group"><label>回程 班機號碼</label><input type="text" id="arr-flight" placeholder="例如：BR199"></div>
            <div class="form-group"><label>落地時間</label><input type="time" id="arr-time"></div>
            <div class="form-group"><label>接機起點 (機場)</label><input type="text" id="arr-start" placeholder="桃園機場航廈"></div>
            <div id="arrExtraGroup"></div><button type="button" class="add-btn" onclick="addExtra('arr')">＋ 增加接機加點</button>
            <div class="form-group">
                <label>接機終點</label>
                <div class="address-row">
                    <select id="arr-city" onchange="updateDistricts('arr')"></select>
                    <select id="arr-dist"></select>
                </div>
                <input type="text" id="arr-detail" class="full-address" placeholder="門牌地址">
                <div class="checkbox-container" onclick="toggleCB('save-arr')">
                    <input type="checkbox" id="save-arr" onclick="event.stopPropagation()">
                    <span class="checkbox-label">下次繼續使用地址與電話</span>
                </div>
            </div>
            <div class="row-group">
                <div class="form-group"><label>大人</label><select id="arr-adult" onchange="checkPaxLimit('arr')"></select></div>
                <div class="form-group"><label>小孩</label><select id="arr-child" onchange="checkPaxLimit('arr')"></select></div>
            </div>
            <div class="section-title">行李規格 (超載警示)</div>
            <div class="row-group">
                <div class="form-group"><label>手提</label><select class="lug-sel" id="arr-lug-hand" onchange="checkAllLuggage('arr')"></select></div>
                <div class="form-group"><label>20吋</label><select class="lug-sel" id="arr-lug-20" onchange="checkAllLuggage('arr')"></select></div>
            </div>
            <div class="row-group">
                <div class="form-group"><label>24-26吋</label><select class="lug-sel" id="arr-lug-24" onchange="checkAllLuggage('arr')"></select></div>
                <div class="form-group"><label>28-30吋</label><select class="lug-sel" id="arr-lug-28" onchange="checkAllLuggage('arr')"></select></div>
            </div>
            <div class="form-group"><label>胖胖箱</label><select class="lug-sel" id="arr-lug-fat" onchange="checkAllLuggage('arr')"></select></div>
            <div class="section-title">兒童座椅需求 (最多 4 欄)</div>
            <div id="arrSeatGroup"></div>
            <button type="button" class="add-btn" onclick="addSeat('arr')">＋ 增加兒童座椅</button>
            <div class="form-group"><label>備註</label><textarea id="arr-memo" rows="2"></textarea></div>
        </div>

        <div class="policy-box">
            <span class="policy-title">沐森禮賓 取消與退款公約</span>
            <div class="policy-content">
                1. <strong>用車 48 小時前</strong>取消：全額退費。<br>
                2. <strong>用車 24-48 小時內</strong>取消：扣除 50% 車資。<br>
                3. <strong>用車 24 小時內或當日</strong>取消：不予退費。<br>
                4. 如遇航班取消、天災，請提供證明，我們將協助改派。<br>
                5. 司機抵達後等候 30 分鐘且聯繫不上，不予退費。
            </div>
            <div class="checkbox-container" onclick="toggleCB('agree-policy')" style="margin-top: 10px; border: 1px solid #d4af37;">
                <input type="checkbox" id="agree-policy" onclick="event.stopPropagation()">
                <span class="checkbox-label" style="font-weight: bold;">我已閱讀並同意以上取消退款公約</span>
            </div>
        </div>

        <button type="button" class="submit-btn" onclick="submitAll()">確認預約並送出</button>
        <div class="footer-note">沐森整合企業社 敬上</div>
    </div>

        function checkPaxLimit(type) {
            const adult = parseInt(document.getElementById(`${type}-adult`).value) || 0;
            const child = parseInt(document.getElementById(`${type}-child`).value) || 0;
            if (adult + child > 8) {
                alert("⚠️ 人數超出限制\n單台車輛扣除司機最多載 8 位。");
                document.getElementById(`${type}-child`).value = "0";
            }
        }

        function checkAllLuggage(type) {
            const fat = parseInt(document.getElementById(`${type}-lug-fat`).value) || 0;
            const lug28 = parseInt(document.getElementById(`${type}-lug-28`).value) || 0;
            const lug24 = parseInt(document.getElementById(`${type}-lug-24`).value) || 0;
            const lug20 = parseInt(document.getElementById(`${type}-lug-20`).value) || 0;
            const hand = parseInt(document.getElementById(`${type}-lug-hand`).value) || 0;
            let score = (fat*2.5) + (lug28*1.5) + (lug24*1.2) + (lug20*0.5) + (hand*0.3);
            const fatOver = ((fat>=5 && lug28>=3) || (fat>=5 && lug24>=4) || (fat>=4 && lug28>=4) || (fat>=4 && lug24>=5) || (fat>=3 && lug28>=5) || (fat>=3 && lug24>=6));

                document.getElementById(`${type}-lug-fat`).value = "0";
                document.getElementById(`${type}-lug-28`).value = "0";
                document.getElementById(`${type}-lug-24`).value = "0";
            }
        }

        function initCityDropdowns() {
            const dCity = document.getElementById('dep-city'); const aCity = document.getElementById('arr-city');
            Object.keys(twData).forEach(city => { dCity.add(new Option(city, city)); aCity.add(new Option(city, city)); });
            updateDistricts('dep'); updateDistricts('arr');
        }

        function initPaxDropdowns() {
            ['dep-adult', 'dep-child', 'arr-adult', 'arr-child'].forEach(id => {
                const sel = document.getElementById(id);
                for(let i=(id.includes('adult')?1:0); i<=8; i++) sel.add(new Option(`${i}位`, i));
            });
        }

        function initLugDropdowns() {
            document.querySelectorAll('.lug-sel').forEach(sel => {
                const max = sel.id.includes('fat') ? 5 : 8;
                for(let i=0; i<=max; i++) sel.add(new Option(`${i}件`, i));
            });
       }

        function addSeat(type) {
            const group = document.getElementById(type + 'SeatGroup');
            // 鎖死 4 欄防呆
            if(group.children.length >= 4) return alert("⚠️ 座椅欄位已達上限\n單次預約最多僅能新增 4 組需求。");
            const div = document.createElement('div'); div.className = "seat-item";
            div.innerHTML = `<select class="seat-type" onchange="const qs=this.parentElement.querySelector('.seat-qty'); qs.style.display=(this.value!=='')?'block':'none';"><option value="">種類</option><option value="正向安全座椅">正向</option><option value="反向安全座椅">反向</option><option value="增高墊">增高墊</option></select><select class="seat-qty"><option value="1">1個</option><option value="2">2個</option><option value="3">3個</option><option value="4">4個</option></select>`;
            group.appendChild(div);
        }

        function updateDistricts(type) {
            const city = document.getElementById(`${type}-city`).value;
            const distSel = document.getElementById(`${type}-dist`); distSel.innerHTML = "";
            twData[city].forEach(dist => { distSel.add(new Option(dist, dist)); });
        }

        function syncPhone(v) { document.getElementById('dep-phone').value = v; document.getElementById('arr-phone').value = v; }

        function loadStorage() {
            ['dep', 'arr'].forEach(t => {
                if (localStorage.getItem(`${t}_cb`) === 'true') {
                    document.getElementById(`save-${t}`).checked = true;
                    if (localStorage.getItem('musen_phone')) syncPhone(localStorage.getItem('musen_phone'));
                    if(localStorage.getItem(`${t}_city`)) {
                        document.getElementById(`${t}-city`).value = localStorage.getItem(`${t}_city`); updateDistricts(t);
                        document.getElementById(`${t}-dist`).value = localStorage.getItem(`${t}_dist`);
                        document.getElementById(`${t}-detail`).value = localStorage.getItem(`${t}_detail`);
                    }
                }
            });
        }

        function toggleCB(id) { document.getElementById(id).checked = !document.getElementById(id).checked; }
        function switchTab(mode) {
            const isD = mode === 'departure';
            document.getElementById('tabDep').className = isD ? 'tab active' : 'tab';
            document.getElementById('tabArr').className = isD ? 'tab' : 'tab active';
            document.getElementById('depSection').className = isD ? 'form-section active' : 'form-section';
            document.getElementById('arrSection').className = isD ? 'form-section' : 'form-section active';
        }
        function addExtra(t) {
            const group = document.getElementById(t + 'ExtraGroup');
            const div = document.createElement('div'); div.style.marginBottom = "8px";
            div.innerHTML = `<input type="text" class="${t}-extra" placeholder="加點地址" style="background:#2a2a2a; border:1px solid #555; height:48px;">`;
            group.appendChild(div);
        }

        function getLuggageInfo(t) {
            const res = []; const ids = {'手提':'-lug-hand', '20吋':'-lug-20', '24-26吋':'-lug-24', '28-30吋':'-lug-28', '胖箱':'-lug-fat'};
            for (let [l, id] of Object.entries(ids)) { let v = document.getElementById(t + id).value; if(v > 0) res.push(`${l}x${v}`); }
            return res.length > 0 ? res.join(', ') : "無";
        }

        function getSeatInfo(t) {
            let res = []; document.getElementById(t + 'SeatGroup').querySelectorAll('.seat-item').forEach(item => {
                const v = item.querySelector('.seat-type').value; const q = item.querySelector('.seat-qty').value;
                if(v) res.push(`${v}x${q}`);
            });
            return res.length > 0 ? res.join(', ') : "不需座椅";
        }

        async function submitAll() {
            if (!document.getElementById('agree-policy').checked) return alert("請先同意「取消退款公約」。");
            const depD = document.getElementById('dep-date').value; const arrD = document.getElementById('arr-date').value;
            if (!depD && !arrD) return alert("請填寫預約日期");

            if (document.getElementById('save-dep').checked || document.getElementById('save-arr').checked) {
                localStorage.setItem('musen_phone', document.getElementById('dep-phone').value);
            }
            ['dep', 'arr'].forEach(t => {
                const cb = document.getElementById(`save-${t}`).checked; localStorage.setItem(`${t}_cb`, cb);
                if(cb) {
                    localStorage.setItem(`${t}_city`, document.getElementById(`${t}-city`).value);
                    localStorage.setItem(`${t}_dist`, document.getElementById(`${t}-dist`).value);
                    localStorage.setItem(`${t}_detail`, document.getElementById(`${t}-detail`).value);
                }
            });

            let payloads = [];
            if (depD) {
                let addr = document.getElementById('dep-city').value + document.getElementById('dep-dist').value + document.getElementById('dep-detail').value;
                let ex = ""; document.querySelectorAll('.dep-extra').forEach((el) => { if(el.value) ex += ` 加點:${el.value}`; });
                let p = `${document.getElementById('dep-adult').value}大 ${document.getElementById('dep-child').value}小`;
                payloads.push({ type: "送機", userName: userName, phone: document.getElementById('dep-phone').value, flight: document.getElementById('dep-flight').value, date: depD, booking_time: document.getElementById('dep-time').value, start: addr + ex, end: document.getElementById('dep-end').value, pax: p, luggage: getLuggageInfo('dep'), seat: getSeatInfo('dep'), memo: document.getElementById('dep-memo').value });
            }
            if (arrD) {
                let addr = document.getElementById('arr-city').value + document.getElementById('arr-dist').value + document.getElementById('arr-detail').value;
                let ex = ""; document.querySelectorAll('.arr-extra').forEach((el) => { if(el.value) ex += ` 加點:${el.value}`; });
                let p = `${document.getElementById('arr-adult').value}大 ${document.getElementById('arr-child').value}小`;
                payloads.push({ type: "接機", userName: userName, phone: document.getElementById('arr-phone').value, flight: document.getElementById('arr-flight').value, date: arrD, booking_time: document.getElementById('arr-time').value, start: document.getElementById('arr-start').value, end: addr + ex, pax: p, luggage: getLuggageInfo('arr'), seat: getSeatInfo('arr'), memo: document.getElementById('arr-memo').value });
            }

            payloads.forEach(data => { fetch(gasUrl, { method: "POST", mode: "no-cors", body: JSON.stringify(data) }); });
            
            let finalMsg = `【 沐森禮賓｜預約需求 】\n👤 姓名：${userName}\n\n`;
            payloads.forEach(p => {
                finalMsg += `${p.type === '送機' ? '🛫' : '🛬'} ${p.type}\n📅 日期：${p.date}\n⏰ 時間：${p.booking_time}\n📞 電話：${p.phone}\n✈️ 班機：${p.flight}\n📍 起點：${p.start}\n🏁 終點：${p.end}\n👥 人數：${p.pax}\n🧳 行李：${p.luggage}\n👶 座椅：${p.seat}\n📝 備註：${p.memo || '無'}\n\n`;
            });

            if (liff.isInClient()) { await liff.sendMessages([{ type: 'text', text: finalMsg }]); liff.closeWindow(); } else { alert(finalMsg); }
        }
    </script>
</body>
</html>
