<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>沐森禮賓｜預約系統</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body{background:#1a1a1a;color:#d4af37;font-family:'PingFang TC',sans-serif;margin:0;padding:15px}
        .container{max-width:500px;margin:auto;background:#222;padding:25px;border-radius:15px;border:1px solid #d4af37;box-shadow:0 10px 40px rgba(0,0,0,.8);box-sizing:border-box}
        h3{text-align:center;color:#fff;margin-bottom:20px}.tab-group{display:flex;margin-bottom:25px;gap:10px}
        .tab{flex:1;padding:12px;border:1px solid #d4af37;border-radius:10px;text-align:center;cursor:pointer}.tab.active{background:#d4af37;color:#1a1a1a;font-weight:bold}
        .form-section{display:none}.form-section.active{display:block}.form-group{margin-bottom:18px}
        label{display:block;margin-bottom:8px;font-size:14px;color:#aaa}
        input,select,textarea{width:100%;height:48px;padding:12px;border-radius:8px;border:1px solid #444;background:#333;color:#fff;box-sizing:border-box;font-size:16px;outline:none;-webkit-appearance:none}
        .address-row{display:flex;gap:8px;margin-bottom:8px}.address-row select{flex:1}
        .checkbox-label {display:flex;align-items:center;margin-top:10px;padding:15px;background:#2a2a2a;border-radius:8px;cursor:pointer;border:1px solid #444;width:100%;box-sizing:border-box}
        .checkbox-label input[type=checkbox]{width:25px;height:25px;margin-right:15px;accent-color:#d4af37;flex-shrink:0;-webkit-appearance:checkbox}
        .section-title{font-size:14px;color:#d4af37;margin:15px 0 10px 0;border-left:3px solid #d4af37;padding-left:8px}
        .grid-item{display:flex;gap:8px;margin-bottom:10px}
        .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
        .sel-main{flex:2;background:#444!important;border:1px solid #d4af37!important}
        .sel-qty{flex:1;display:none;background:#555!important;border:1px solid #d4af37!important}
        .del-btn{width:40px;background:none;border:none;color:#ff4444;font-size:24px;cursor:pointer}
        .policy-box{margin-top:25px;padding:15px;background:#2d2d2d;border-radius:10px;border:1px solid #444;font-size:13px;color:#ccc;line-height:1.6}
        .policy-title{color:#d4af37;font-weight:bold;display:block;text-align:center;border-bottom:1px solid #444;padding-bottom:8px}
        .policy-content{height:100px;overflow-y:scroll}
        .add-btn{background:0 0;color:#d4af37;border:1px dashed #d4af37;padding:12px;width:100%;border-radius:8px;margin-bottom:15px;cursor:pointer}
        .submit-btn{background:linear-gradient(to bottom,#d4af37,#b8860b);color:#1a1a1a;border:none;padding:18px;border-radius:50px;font-size:18px;font-weight:bold;width:100%;margin-top:20px;cursor:pointer}
    </style>
</head>
<body>
    <div class="container">
        <h3 id="userNameDisplay">沐森禮賓 預約系統</h3>
        <div class="tab-group">
            <div id="tabDep" class="tab active" onclick="switchTab('departure')">送機填寫</div>
            <div id="tabArr" class="tab" onclick="switchTab('arrival')">接機填寫</div>
        </div>

        <div id="depSection" class="form-section active">
            <div class="form-group"><label>送機日期</label><input type="date" id="dep-date"></div>
            <div class="form-group"><label>聯絡電話</label><input type="tel" id="dep-phone" placeholder="僅限數字" oninput="this.value=this.value.replace(/[^0-9]/g,'');syncPhone(this.value)"></div>
            <div class="form-group"><label>去程 班機</label><input type="text" id="dep-flight" placeholder="例如：BR123" oninput="this.value=this.value.replace(/[^A-Za-z0-9]/g,'').toUpperCase()"></div>
            <div class="form-group"><label>上車時間</label><input type="time" id="dep-time"></div>
            <div class="form-group"><label>上車起點</label>
                <div class="address-row"><select id="dep-city" onchange="updateDistricts('dep')"></select><select id="dep-dist"></select></div>
                <input type="text" id="dep-detail" placeholder="門牌地址">
                <label class="checkbox-label"><input type="checkbox" id="save-dep"><span>下次繼續使用地址與電話</span></label>
            </div>
            <div id="depExtraGroup"></div><button class="add-btn" onclick="addExtra('dep')">＋ 增加送機加點</button>
            <div class="form-group"><label>送機終點</label><input type="text" id="dep-end" placeholder="機場航廈"></div>
            <div class="section-title">乘車人數 (上限 8 位)</div>
            <div class="grid-2"><select id="dep-adult" onchange="checkPaxLimit('dep')"></select><select id="dep-child" onchange="checkPaxLimit('dep')"></select></div>
            <div class="section-title">行李規格 (最多 5 欄)</div><div id="depLugGroup"></div><button class="add-btn" onclick="addGrid('dep','Lug')">＋ 增加行李</button>
            <div class="section-title">兒童座椅需求 (最多 4 組)</div><div id="depSeatGroup"></div><button class="add-btn" onclick="addGrid('dep','Seat')">＋ 增加兒童座椅</button>
            <div class="form-group"><label>備註</label><textarea id="dep-memo"></textarea></div>
        </div>

        <div id="arrSection" class="form-section">
            <div class="form-group"><label>接機日期</label><input type="date" id="arr-date"></div>
            <div class="form-group"><label>聯絡電話</label><input type="tel" id="arr-phone" placeholder="僅限數字" oninput="this.value=this.value.replace(/[^0-9]/g,'');syncPhone(this.value)"></div>
            <div class="form-group"><label>回程 班機</label><input type="text" id="arr-flight" placeholder="例如：BR123" oninput="this.value=this.value.replace(/[^A-Za-z0-9]/g,'').toUpperCase()"></div>
            <div class="form-group"><label>落地時間</label><input type="time" id="arr-time"></div>
            <div class="form-group"><label>接機起點 (機場)</label><input type="text" id="arr-start" placeholder="機場航廈"></div>
            <div id="arrExtraGroup"></div><button class="add-btn" onclick="addExtra('arr')">＋ 增加接機加點</button>
            <div class="form-group"><label>接機終點</label>
                <div class="address-row"><select id="arr-city" onchange="updateDistricts('arr')"></select><select id="arr-dist"></select></div>
                <input type="text" id="arr-detail" placeholder="門牌地址">
                <label class="checkbox-label"><input type="checkbox" id="save-arr"><span class="checkbox-text">下次繼續使用地址與電話</span></label>
            </div>
            <div class="section-title">乘車人數 (上限 8 位)</div>
            <div class="grid-2"><select id="arr-adult" onchange="checkPaxLimit('arr')"></select><select id="arr-child" onchange="checkPaxLimit('arr')"></select></div>
            <div class="section-title">行李規格 (最多 5 欄)</div><div id="arrLugGroup"></div><button class="add-btn" onclick="addGrid('arr','Lug')">＋ 增加行李</button>
            <div class="section-title">兒童座椅需求 (最多 4 組)</div><div id="arrSeatGroup"></div><button class="add-btn" onclick="addGrid('arr','Seat')">＋ 增加兒童座椅</button>
            <div class="form-group"><label>備註</label><textarea id="arr-memo"></textarea></div>
        </div>

        <div class="policy-box"><span class="policy-title">沐森禮賓 取消與退款公約</span>
            <div class="policy-content">1. 用車 48 小時前：全額退費。<br>2. 用車 24-48 小時內：扣 50% 車資。<br>3. 用車 24 小時內或當日：不予退費。<br>4. 航班取消或天災，請提證明協助改派。<br>5. 司機抵達等候 30 分鐘失聯，不予退費。</div>
            <label class="checkbox-label" style="border:1px solid #d4af37; margin-top:15px"><input type="checkbox" id="agree-policy"><span style="font-weight:bold; color:#d4af37">我已閱讀並同意以上公約</span></label>
        </div>
        <button class="submit-btn" id="finalSubmit" onclick="submitAll()">確認預約並送出</button>
    </div>

        main();

        function addGrid(t, type) {
            const g=document.getElementById(t+type+'Group');
            const max = (type==='Lug')?5:4;
            if(g.children.length>=max) return alert(`⚠️ 欄位已達上限`);
            const d=document.createElement('div'); d.className="grid-item";
            const opt = (type==='Lug') 
                ? '<option value="">選擇行李</option><option value="手提行李">手提行李</option><option value="20吋登機箱">20吋登機箱</option><option value="24-26吋行李箱">24-26吋行李箱</option><option value="28-30吋行李箱">28-30吋行李箱</option><option value="胖胖箱">胖胖箱</option>'
                : '<option value="">選擇座椅</option><option value="正向安全座椅">正向</option><option value="反向安全座椅">反向</option><option value="增高墊">增高墊</option>';
            const maxQty = (type==='Seat') ? 4 : 8;
            let qtyOpt = ''; for(let i=0; i<=maxQty; i++) qtyOpt += `<option value="${i}">${i}個</option>`;
            d.innerHTML=`<select class="sel-main" onchange="const qs=this.parentElement.querySelector('.sel-qty');qs.style.display=(this.value!=='')?'block':'none';checkDynamicLimit('${t}','${type}',this)">${opt}</select><select class="sel-qty" onchange="checkDynamicLimit('${t}','${type}',this)">${qtyOpt}</select><button type="button" class="del-btn" onclick="this.parentElement.remove()">✕</button>`;
            g.appendChild(d);
        }

        function checkDynamicLimit(t, type, element) {
            let total = 0;
            const group = document.getElementById(t+type+'Group');
            group.querySelectorAll('.grid-item').forEach(i => {
                const mainVal = i.querySelector('.sel-main').value;
                const qtyVal = parseInt(i.querySelector('.sel-qty').value) || 0;
                if(mainVal) {
                    if(type === 'Seat') total += qtyVal;
                    else {
                        const s = {'手提行李':0.3, '20吋登機箱':0.5, '24-26吋行李箱':1.2, '28-30吋行李箱':1.5, '胖胖箱':2.5};
                        total += (s[mainVal] || 0) * qtyVal;
                    }
                }
            });
            if(type==='Seat' && total > 4) { alert("⚠️ 座椅總數不可超過 4 個"); element.value = "0"; }
            if(type==='Lug' && total > 14.5) { alert("⚠️ 行李總量已超過車輛負荷"); element.value = "0"; }
        }

        function addExtra(t){
            const g=document.getElementById(t+'ExtraGroup'),d=document.createElement('div');d.className="extra-item";
            d.style.display="flex"; d.style.marginBottom="10px";
            d.innerHTML=`<input type="text" class="${t}-extra" placeholder="加點地址" style="flex:1"><button type="button" class="del-btn" onclick="this.parentElement.remove()">✕</button>`;
            g.appendChild(d);
        }

        function checkPaxLimit(t){const a=parseInt(document.getElementById(`${t}-adult`).value)||0,c=parseInt(document.getElementById(`${t}-child`).value)||0;if(a+c>8){alert("⚠️ 人數上限 8 位");document.getElementById(`${t}-child`).value="0"}}
        function initCityDropdowns(){const d=document.getElementById('dep-city'),a=document.getElementById('arr-city');Object.keys(twData).forEach(c=>{d.add(new Option(c,c));a.add(new Option(c,c))});updateDistricts('dep');updateDistricts('arr')}
        function initPaxDropdowns(){['dep-adult','dep-child','arr-adult','arr-child'].forEach(id=>{const s=document.getElementById(id);for(let i=(id.includes('adult')?1:0);i<=8;i++)s.add(new Option(id.includes('adult')?`大人 ${i}位`:`小孩 ${i}位`,i))})}
        function updateDistricts(t){const c=document.getElementById(`${t}-city`).value,s=document.getElementById(`${t}-dist`);s.innerHTML="";twData[c].forEach(d=>{s.add(new Option(d,d))})}
        function syncPhone(v){document.getElementById('dep-phone').value=v;document.getElementById('arr-phone').value=v}
        function loadStorage(){['dep','arr'].forEach(t=>{if(localStorage.getItem(`${t}_cb`)==='true'){document.getElementById(`save-${t}`).checked=!0;if(localStorage.getItem('musen_phone'))syncPhone(localStorage.getItem('musen_phone'));if(localStorage.getItem(`${t}_city`)){document.getElementById(`${t}-city`).value=localStorage.getItem(`${t}_city`);updateDistricts(t);document.getElementById(`${t}-dist`).value=localStorage.getItem(`${t}_dist`);document.getElementById(`${t}-detail`).value=localStorage.getItem(`${t}_detail`)}}})}
        function switchTab(m){const isD=m==='departure';document.getElementById('tabDep').className=isD?'tab active':'tab';document.getElementById('tabArr').className=isD?'tab':'tab active';document.getElementById('depSection').className=isD?'form-section active':'form-section';document.getElementById('arrSection').className=isD?'form-section':'form-section active'}
        
        function getGridData(t, type){
            let r=[]; document.getElementById(t+type+'Group').querySelectorAll('.grid-item').forEach(i=>{
                const v=i.querySelector('.sel-main').value, q=i.querySelector('.sel-qty').value;
                if(v && q!=="0") r.push(`${v}x${q}`);
            });
            return r.length>0?r.join(', '):"無";
        }

        async function submitAll(){
            if(!document.getElementById('agree-policy').checked)return alert("請勾選同意公約");
            const dD=document.getElementById('dep-date').value,aD=document.getElementById('arr-date').value;if(!dD&&!aD)return alert("請填寫預約日期");
            
            ['dep','arr'].forEach(t=>{const cb=document.getElementById(`save-${t}`).checked;localStorage.setItem(`${t}_cb`,cb);if(cb){localStorage.setItem('musen_phone',document.getElementById('dep-phone').value);localStorage.setItem(`${t}_city`,document.getElementById(`${t}-city`).value);localStorage.setItem(`${t}_dist`,document.getElementById(`${t}-dist`).value);localStorage.setItem(`${t}_detail`,document.getElementById(`${t}-detail`).value)}});
            
            let payloads=[];
            if(dD){
                let addr=document.getElementById('dep-city').value+document.getElementById('dep-dist').value+document.getElementById('dep-detail').value,ex="";document.querySelectorAll('.dep-extra').forEach(el=>{if(el.value)ex+=` 加點:${el.value}`});
                payloads.push({type:"送機",userName:userName,phone:document.getElementById('dep-phone').value,flight:document.getElementById('dep-flight').value,date:dD,booking_time:document.getElementById('dep-time').value,start:addr+ex,end:document.getElementById('dep-end').value,pax:`${document.getElementById('dep-adult').value}大${document.getElementById('dep-child').value}小`,luggage:getGridData('dep','Lug'),seat:getGridData('dep','Seat'),memo:document.getElementById('dep-memo').value});
            }
            if(aD){
                let addr=document.getElementById('arr-city').value+document.getElementById('arr-dist').value+document.getElementById('arr-detail').value,ex="";document.querySelectorAll('.arr-extra').forEach(el=>{if(el.value)ex+=` 加點:${el.value}`});
                payloads.push({type:"接機",userName:userName,phone:document.getElementById('arr-phone').value,flight:document.getElementById('arr-flight').value,date:aD,booking_time:document.getElementById('arr-time').value,start:document.getElementById('arr-start').value,end:addr+ex,pax:`${document.getElementById('arr-adult').value}大${document.getElementById('arr-child').value}小`,luggage:getGridData('arr','Lug'),seat:getGridData('arr','Seat'),memo:document.getElementById('arr-memo').value});
            }
            
            payloads.forEach(d=>{fetch(gasUrl,{method:"POST",mode:"no-cors",body:JSON.stringify(d)})});
            let finalMsg=`【 沐森禮賓｜預約需求 】\n👤 姓名：${userName}\n\n`;
            payloads.forEach(p=>{finalMsg+=`${p.type==='送機'?'🛫':'🛬'} ${p.type}\n📅 日期：${p.date}\n⏰ 時間：${p.booking_time}\n📞 電話：${p.phone}\n✈️ 班機：${p.flight}\n📍 起點：${p.start}\n🏁 終點：${p.end}\n👥 人數：${p.pax}\n🧳 行李：${p.luggage}\n👶 座椅：${p.seat}\n📝 備註：${p.memo||'無'}\n\n`});
            
            if(liff.isInClient()){await liff.sendMessages([{type:'text',text:finalMsg}]);liff.closeWindow()}else{alert(finalMsg)}
        }
    </script>
</body>
</html>
