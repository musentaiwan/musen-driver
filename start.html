<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任務開始</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #001f3f; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #d4af37; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div id="status">正在定位並回報出發位置...</div>

    <script>
        window.onload = function() {
            // !!! 記得這裡要換成你自己的 LIFF ID !!!
            liff.init({ liffId: "2009589320-jnRQxLaF" }).then(() => {
                if (!liff.isLoggedIn()) { 
                    liff.login(); 
                } else {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        const lat = pos.coords.latitude.toFixed(6);
                        const lng = pos.coords.longitude.toFixed(6);
                        const timeStr = new Date().toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit' });
                        
                        liff.sendMessages([{
                            "type": "flex", 
                            "altText": "【任務回報：出發】",
                            "contents": {
                                "type": "bubble", 
                                "body": { 
                                    "type": "box", "layout": "vertical", "contents": [
                                        { "type": "text", "text": "任務開始", "size": "sm", "color": "#007AFF", "weight": "bold" },
                                        { "type": "text", "text": "出發時間 " + timeStr, "size": "xxl", "margin": "md", "weight": "bold" },
                                        { "type": "separator", "margin": "lg" },
                                        { "type": "box", "layout": "vertical", "margin": "lg", "spacing": "sm", "contents": [
                                            { "type": "box", "layout": "baseline", "spacing": "sm", "contents": [
                                                { "type": "text", "text": "狀態", "color": "#aaaaaa", "size": "sm", "flex": 2 },
                                                { "type": "text", "text": "司機已發車", "wrap": true, "color": "#666666", "size": "sm", "flex": 4 }
                                            ]},
                                            { "type": "box", "layout": "baseline", "spacing": "sm", "contents": [
                                                { "type": "text", "text": "座標", "color": "#aaaaaa", "size": "sm", "flex": 2 },
                                                { "type": "text", "text": lat + ", " + lng, "wrap": true, "color": "#666666", "size": "sm", "flex": 4 }
                                            ]}
                                        ]}
                                    ]
                                }
                            }
                        }]).then(() => { 
                            document.getElementById('status').innerText = "回報成功！";
                            setTimeout(() => liff.closeWindow(), 1000); 
                        }).catch((err) => {
                            alert("訊息傳送失敗，請確認 Scopes 權限。");
                        });
                    }, (err) => {
                        alert("定位失敗：請開啟 GPS 定位權限");
                        document.getElementById('status').innerText = "定位失敗，請重新操作";
                    }, { enableHighAccuracy: true, timeout: 10000 });
                }
            }).catch((err) => {
                console.log('LIFF 初始化失敗', err);
            });
        };
    </script>
</body>
</html>
