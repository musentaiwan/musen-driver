<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沐森商務回報系統</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #001f3f; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #d4af37; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div id="status">系統讀取中...</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const actionType = urlParams.get('type') || 'start';

        const configs = {
            'start':  { title: "任務開始", text: "司機已發車", color: "#007AFF", alt: "【任務回報：出發】" },
            'arrive': { title: "抵達現場", text: "司機已就位等待", color: "#FFCC00", alt: "【任務回報：到點】" },
            'pickup': { title: "乘客上車", text: "行程正式開始", color: "#1DB446", alt: "【任務回報：客上】" },
            'dropoff':{ title: "行程結束", text: "本趟任務已完成", color: "#FF3B30", alt: "【任務回報：結案】" }
        };

        const config = configs[actionType];

        window.onload = function() {
            // 統一使用你這一組 LIFF ID
            liff.init({ liffId: "2009589320-LrjrxK7g" }).then(() => {
                if (!liff.isLoggedIn()) { 
                    liff.login(); 
                } else {
                    document.getElementById('status').innerText = "正在精確定位中...";
                    navigator.geolocation.getCurrentPosition((pos) => {
                        const lat = pos.coords.latitude.toFixed(6);
                        const lng = pos.coords.longitude.toFixed(6);
                        const timeStr = new Date().toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit' });

                        liff.sendMessages([{
                            "type": "flex",
                            "altText": config.alt,
                            "contents": {
                                "type": "bubble",
                                "body": {
                                    "type": "box", "layout": "vertical", "contents": [
                                        { "type": "text", "text": config.title, "size": "sm", "color": config.color, "weight": "bold" },
                                        { "type": "text", "text": config.title + " " + timeStr, "size": "xxl", "margin": "md", "weight": "bold" },
                                        { "type": "separator", "margin": "lg" },
                                        { "type": "box", "layout": "vertical", "margin": "lg", "spacing": "sm", "contents": [
                                            { "type": "box", "layout": "baseline", "spacing": "sm", "contents": [
                                                { "type": "text", "text": "狀態", "color": "#aaaaaa", "size": "sm", "flex": 2 },
                                                { "type": "text", "text": config.text, "wrap": true, "color": "#666666", "size": "sm", "flex": 4 }
                                            ]},
                                            { "type": "box", "layout": "baseline", "spacing": "sm", "contents": [
                                                { "type": "text", "text": "座標", "color": "#aaaaaa", "size": "sm", "flex": 2 },
                                                { "type": "text", "text": lat + ", " + lng, "wrap": true, "color": "#666666", "size": "sm", "flex": 4 }
                                            ]}
                                        ]}
                                    ]
                                }
                            }
                        }]).then(() => {
                            document.getElementById('status').innerText = "回報成功！";
                            setTimeout(() => liff.closeWindow(), 1000);
                        }).catch(e => alert("發送失敗，請確認 Scopes 權限"));
                    }, (err) => {
                        alert("定位失敗，請確保手機 GPS 已開啟並授權。");
                    }, { enableHighAccuracy: true, timeout: 10000 });
                }
            });
        };
    </script>
</body>
</html>
