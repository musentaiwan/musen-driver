<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沐森商務｜賓客禮遇回饋</title>
    <style>
        body { background-color: #1a1a1a; color: #d4af37; font-family: 'PingFang TC', sans-serif; text-align: center; padding: 20px; }
        .card { border: 1px solid #d4af37; border-radius: 15px; padding: 25px; background: linear-gradient(145deg, #222, #111); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { font-weight: 300; letter-spacing: 2px; margin-bottom: 30px; }
        .star-rating { font-size: 30px; margin: 20px 0; cursor: pointer; }
        .star { color: #444; transition: 0.3s; }
        .star.active { color: #d4af37; text-shadow: 0 0 10px #d4af37; }
        .tag-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 20px 0; }
        .tag { border: 1px solid #d4af37; padding: 8px 15px; border-radius: 20px; font-size: 14px; cursor: pointer; transition: 0.3s; }
        .tag.selected { background-color: #d4af37; color: #1a1a1a; }
        button { background-color: #d4af37; color: #1a1a1a; border: none; padding: 15px 40px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 30px; width: 100%; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://your-logo-url.png" style="width: 80px; margin-bottom: 10px;">
        <h2>尊貴的賓客，感謝您的搭乘</h2>
        <p style="font-size: 14px; color: #888;">您的滿意是我們唯一的追求</p>
        
        <div class="star-rating" id="starGroup">
            <span class="star" data-value="1">★</span><span class="star" data-value="2">★</span><span class="star" data-value="3">★</span><span class="star" data-value="4">★</span><span class="star" data-value="5">★</span>
        </div>

        <div class="tag-group" id="tagGroup">
            <div class="tag">準時抵達</div><div class="tag">車內整潔</div><div class="tag">駕駛平穩</div><div class="tag">協助行李</div><div class="tag">服務禮貌</div>
        </div>

        <button onclick="submitFeedback()">提交評鑑</button>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        let selectedStars = 0;
        let selectedTags = [];

        // 點擊星星邏輯
        document.querySelectorAll('.star').forEach(star => {
            star.onclick = function() {
                selectedStars = this.dataset.value;
                document.querySelectorAll('.star').forEach(s => s.classList.toggle('active', s.dataset.value <= selectedStars));
            }
        });

        // 點擊標籤邏輯
        document.querySelectorAll('.tag').forEach(tag => {
            tag.onclick = function() {
                this.classList.toggle('selected');
                let text = this.innerText;
                selectedTags.includes(text) ? selectedTags = selectedTags.filter(t => t !== text) : selectedTags.push(text);
            }
        });

        async function submitFeedback() {
            if(selectedStars === 0) return alert('請先為服務評分，謝謝！');
            
            // 這裡對接您原本的 GAS 後台
            const response = await fetch('您的 GAS 部署網址', {
                method: 'POST',
                body: JSON.stringify({
                    type: 'FEEDBACK',
                    stars: selectedStars,
                    tags: selectedTags.join(','),
                    timestamp: new Date().toLocaleString()
                })
            });
            
            liff.closeWindow(); // 提交後自動關閉頁面
        }
        
        liff.init({ liffId: "您的第 6 個 LIFF ID" });
    </script>
</body>
</html>
